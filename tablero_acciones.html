<script>
const SAVE_KEY = 'ximpler_objetivos_demo_v7_planes';
const PLANNING_SAVE_KEY = 'ximpler_planeaciones_demo_v1';
const LEGACY_KEYS = ['ximpler_objetivos_demo_v7_planes','ximpler_objetivos_demo_v6_3','ximpler_objetivos_demo_v6_1','ximpler_objetivos_demo_v6','ximpler_objetivos_demo_v5','ximpler_objetivos_demo_v4','ximpler_objetivos_demo_v3','ximpler_objetivos_demo_v1'];

function escapeHtml(text){ 
  const div = document.createElement('div'); 
  div.textContent = String(text ?? ''); 
  return div.innerHTML; 
}

// 🔥 NUEVA FUNCIÓN DE FECHA RELATIVA
function formatRelativeDate(dateString){
  if (!dateString) return '—';

  const today = new Date();
  today.setHours(0,0,0,0);

  const target = new Date(dateString + 'T00:00:00');

  const diffTime = target - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays > 0) return `En ${diffDays} día${diffDays !== 1 ? 's' : ''}`;
  if (diffDays === 0) return 'Hoy';
  return `Terminó hace ${Math.abs(diffDays)} día${diffDays !== -1 ? 's' : ''}`;
}

function statusKey(status){ 
  return String(status || 'Por hacer')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,'_'); 
}

function isOverdue(dueDate, status){
  if (!dueDate) return false;
  if (String(status).toLowerCase() === 'terminada') return false;

  const today = new Date();
  today.setHours(0,0,0,0);

  return new Date(dueDate + 'T00:00:00') < today;
}

function isDoneStatus(status){
  return ['terminada','terminado','completada','completado','cumplida','cumplido']
    .includes(statusKey(status));
}

function actionAdvance(action){ 
  return isDoneStatus(action?.status) ? 100 : 0; 
}

function initiativeOperationalAdvance(activity = {}){
  const actions = Array.isArray(activity.actions) ? activity.actions.map(normalizeAction) : [];

  if (!actions.length) return isDoneStatus(activity.status) ? 100 : 0;

  return Math.round(
    actions.reduce((acc, action) => acc + actionAdvance(action), 0) / actions.length
  );
}

function objectiveOperationalAdvance(obj = {}){
  const activities = Array.isArray(obj.activities) ? obj.activities : [];
  if (!activities.length) return 0;

  return Math.round(
    activities.reduce((acc, activity) => acc + initiativeOperationalAdvance(activity), 0) / activities.length
  );
}

function getAdvanceColor(value){
  if (value >= 80) return 'var(--green)';
  if (value >= 50) return 'var(--yellow)';
  return 'var(--red)';
}

function advanceRing(value, label){
  const val = Math.max(0, Math.min(100, Number(value || 0)));
  return `
    <div class="advance-box">
      <div class="advance-ring" style="--advance:${val}; --advance-color:${getAdvanceColor(val)};">
        <span>${val}%</span>
      </div>
      ${label ? `<div class="advance-label">${escapeHtml(label)}</div>` : ''}
    </div>`;
}

function normalizeAction(action = {}){
  return {
    title: action.title || action.name || '',
    responsible: action.responsible || action.owner || '',
    dueDate: action.dueDate || action.date || '',
    detail: action.detail || action.description || '',
    status: action.status || 'Por hacer'
  };
}

function loadObjectives(){
  for (const key of LEGACY_KEYS){
    const saved = localStorage.getItem(key);
    if (!saved) continue;
    try {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed)) return parsed;
    } catch(e){}
  }
  return [];
}

function loadPlannings(){
  try { return JSON.parse(localStorage.getItem(PLANNING_SAVE_KEY) || '[]'); }
  catch(e){ return []; }
}

const params = new URLSearchParams(window.location.search);
const planningId = params.get('planningId');

const plannings = loadPlannings();
const planning = plannings.find(item => item.id === planningId);

const objectives = loadObjectives().filter(obj => !planningId || obj.planningId === planningId);

function buildRows(){
  const rows = [];

  objectives.forEach(obj => {
    const activities = obj.activities || [];

    activities.forEach(activity => {
      const actions = (activity.actions || []).map(normalizeAction);

      if (!actions.length){
        rows.push({
          objective: obj.name,
          objectiveAdvance: objectiveOperationalAdvance(obj),
          initiative: activity.name,
          initiativeAdvance: initiativeOperationalAdvance(activity),
          actionTitle: 'Sin acciones asignadas',
          actionDetail: 'Esta iniciativa todavía no tiene acciones registradas.',
          responsible: activity.owner || obj.leader || '—',
          dueDate: activity.dueDate || '',
          status: activity.status || 'pendiente',
          hasAction: false
        });
        return;
      }

      actions.forEach(action => {
        const overdue = isOverdue(action.dueDate, action.status);

        rows.push({
          objective: obj.name,
          objectiveAdvance: objectiveOperationalAdvance(obj),
          initiative: activity.name,
          initiativeAdvance: initiativeOperationalAdvance(activity),
          actionTitle: action.title,
          actionDetail: action.detail,
          responsible: action.responsible,
          dueDate: action.dueDate,
          status: overdue ? 'Vencida' : action.status,
          hasAction: true
        });
      });
    });
  });

  return rows;
}

function render(){
  const rows = buildRows();
  const body = document.getElementById('actionsBody');

  body.innerHTML = rows.map(row => `
    <tr>
      <td>${advanceRing(row.objectiveAdvance)}</td>
      <td>${escapeHtml(row.objective)}</td>
      <td>${advanceRing(row.initiativeAdvance)}</td>
      <td>${escapeHtml(row.initiative)}</td>
      <td>${escapeHtml(row.actionTitle)}</td>
      <td>${escapeHtml(row.responsible)}</td>

      <!-- 🔥 AQUÍ ESTÁ EL CAMBIO -->
      <td>${formatRelativeDate(row.dueDate)}</td>

      <td><span class="status-badge status-${statusKey(row.status)}">${escapeHtml(row.status)}</span></td>
    </tr>
  `).join('');
}

render();
</script>
